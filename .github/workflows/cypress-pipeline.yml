name: End-to-End Test Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Run Cypress Tests
        uses: cypress-io/github-action@v6
        with:
          build: npm run build --if-present
          spec: cypress/e2e/first_test.cy.js

      - name: Broadcast Pipeline Telemetry to Dashboard
        if: always()
        run: |
          if [ "${{ job.status }}" = "failure" ]; then
            ERROR_DETAILS="Cypress Assertion Failed: Target element not found or timeout occurred during E2E UI pass."
          else
            ERROR_DETAILS="All spec assertions passed smoothly."
          fi

          # Using jq format or plain clean string mapping to guarantee it doesn't drop
          curl -X POST -H "Content-Type: application/json" \
          --data-binary @- <<EOF
          {
            "status": "${{ job.status }}",
            "repository": { "full_name": "${{ github.repository }}" },
            "workflow": "${{ github.workflow }}",
            "errorMessage": "$ERROR_DETAILS"
          }
  EOF
          
